<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Healthcare AI Security Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>SOS Healthcare Platform</h1>
    <nav class="tab-nav">
      <a href="index.html" class="tab active">💬 Chat</a>
      <a href="dashboard.html" class="tab">📊 Dashboard</a>
    </nav>

    <div class="toggleWrapper">
      <label class="switch">
        <input type="checkbox" id="lakeraToggle" onchange="toggleLakera()" />
        <span class="slider"></span>
      </label>

      <div id="lakeraIndicator">Lakera Guard OFF</div>
    </div>

    <div class="stats">
      <div class="statBox">
        Lakera Blocks

        <div id="lakeraCount">0</div>
      </div>
    </div>

    <div class="layout">
      <div class="chatSection">
        <h2>Healthcare Assistant</h2>

        <div id="chatContainer"></div>

        <div class="inputBox">
          <input id="userInput" placeholder="Ask a healthcare question..." />

          <button onclick="sendMessage()">Send</button>
        </div>
      </div>

      <div class="securitySection">
        <h2>Security Analysis</h2>

        <div id="securityPanel" class="safePanel">No threats detected</div>

        <h2>Threat Log</h2>

        <div id="logContainer"></div>

        <h2>Attack Simulator</h2>

        <select id="attackCategory">
          <option value="">-- Select attack type --</option>
          <option>Prompt Attack</option>
          <option>PII – SSN</option>
          <option>PII – Phone</option>
          <option>PII – Email</option>
          <option>PII – Credit Card</option>
          <option>Crime</option>
          <option>Hate Speech</option>
          <option>Violence</option>
          <option>Weapons</option>
        </select>

        <button onclick="simulateAttack()">Inject Attack</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
